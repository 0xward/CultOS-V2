name: Vault State Recorder

on:
  schedule:
    - cron: '5 0 * * *'
    - cron: '20 1 * * *'
    - cron: '40 2 * * *'
    - cron: '10 3 * * *'
    - cron: '50 5 * * *'
    - cron: '15 8 * * *'
    - cron: '35 10 * * *'
    - cron: '0 12 * * *'
    - cron: '25 14 * * *'
    - cron: '45 16 * * *'
    - cron: '10 18 * * *'
    - cron: '30 20 * * *'
    - cron: '55 21 * * *'
    - cron: '20 22 * * *'
    - cron: '50 23 * * *'
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - name: Roll
        id: gate
        run: |
          R=$((RANDOM % 15))
          # Keep 11-15 out of 15 (drop ~0-4)
          [ $R -lt 1 ] && echo "run=false" >> $GITHUB_OUTPUT || echo "run=true" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Fetch Stacks vault context
        if: steps.gate.outputs.run == 'true'
        id: stacks
        run: |
          INFO=$(curl -sf "https://api.hiro.so/v2/info" || echo '{}')
          HEIGHT=$(echo "$INFO" | python3 -c "
          import sys,json
          try: print(json.load(sys.stdin).get('stacks_tip_height',''))
          except: print('')
          ")
          BURN=$(echo "$INFO" | python3 -c "
          import sys,json
          try: print(json.load(sys.stdin).get('burn_block_height',''))
          except: print('')
          ")
          echo "height=$HEIGHT" >> $GITHUB_OUTPUT
          echo "burn=$BURN" >> $GITHUB_OUTPUT

      - name: Pick message
        if: steps.gate.outputs.run == 'true'
        id: msg
        run: |
          H="${{ steps.stacks.outputs.height }}"
          B="${{ steps.stacks.outputs.burn }}"
          DATE=$(date -u +"%Y-%m-%d")
          MSGS=(
            "vault: record stake snapshot at block $H"
            "update: token emission state $DATE"
            "chore: cult vault epoch — tip $H"
            "data: meme token anchor $DATE"
            "vault: staking epoch checkpoint $H"
            "update: $DATE vault state persisted"
            "chore: cult stake registry synced"
            "data: BTC-anchored vault record — $B"
            "vault: on-chain epoch $H committed"
            "update: token vault health check $DATE"
            "chore: stake layer snapshot — $DATE"
            "data: cult vault state at tip $H"
            "vault: emission checkpoint block $H"
            "update: staking record — BTC $B"
            "chore: vault epoch close $DATE"
          )
          IDX=$((RANDOM % ${#MSGS[@]}))
          echo "text=${MSGS[$IDX]}" >> $GITHUB_OUTPUT

      - name: Write vault log
        if: steps.gate.outputs.run == 'true'
        run: |
          mkdir -p vault
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf "%s | stacks_tip=%s | btc_anchor=%s | status=active\n" \
            "$TIMESTAMP" \
            "${{ steps.stacks.outputs.height }}" \
            "${{ steps.stacks.outputs.burn }}" \
            >> vault/epoch-log.txt

      - name: Commit
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "0xward"
          git config user.email "0xward.dev@gmail.com"
          git add vault/epoch-log.txt
          git diff --staged --quiet && echo "clean" && exit 0
          git commit -m "${{ steps.msg.outputs.text }}"
          git push
